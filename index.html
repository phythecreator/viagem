<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>O Meu Roteiro: Nice & Mónaco</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        /* O mapa vai ocupar o ecrã todo do telemóvel */
        #map { height: 100vh; width: 100vw; }
        
        /* Botão para localizar o utilizador */
        #locate-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background-color: #0078A8;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 16px;
            border-radius: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <button id="locate-btn">📍 Onde estou?</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script>
        // 1. Iniciar o Mapa centrado entre Nice e o Mónaco
        var map = L.map('map').setView([43.7150, 7.3500], 11);

        // Adicionar o fundo do mapa (OpenStreetMap é gratuito e não precisa de chave)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Variáveis para guardar a localização do utilizador e a rota atual
        var userLocation = null;
        var currentRoute = null;
        var userMarker = null;

        // 2. A tua lista de locais (Alguns já preenchidos com as coordenadas exatas)
        var locais = [
            // --- NICE ---
            { nome: "Promenade des Anglais", tipo: "Monument", lat: 43.6946, lng: 7.2605 },
            { nome: "Parque Colina do Castelo", tipo: "Monument", lat: 43.6954, lng: 7.2797 },
            { nome: "Catedral de São Nicolau", tipo: "Monument", lat: 43.7036, lng: 7.2536 },
            { nome: "Place Masséna", tipo: "Monument", lat: 43.6969, lng: 7.2703 },
            { nome: "Chez Pipo (Socca)", tipo: "Restaurante", lat: 43.6968, lng: 7.2846 },
            { nome: "Le Bistrot d'Antoine", tipo: "Restaurante", lat: 43.6967, lng: 7.2758 },
            
            // --- MÓNACO ---
            { nome: "Palácio do Príncipe", tipo: "Monument", lat: 43.7310, lng: 7.4198 },
            { nome: "Casino de Monte Carlo", tipo: "Monument", lat: 43.7393, lng: 7.4282 },
            { nome: "Museu Oceanográfico", tipo: "Monument", lat: 43.7306, lng: 7.4254 },
            { nome: "Marché de la Condamine", tipo: "Restaurante", lat: 43.7325, lng: 7.4190 },
            { nome: "Bambi (Restaurante)", tipo: "Restaurante", lat: 43.7335, lng: 7.4195 }
        ];

        // 3. Adicionar os marcadores ao mapa
        locais.forEach(function(local) {
            // Escolher o emoji dependendo se é restaurante ou monumento
            var icone = local.tipo === "Restaurante" ? "🍽️" : "🏛️";
            
            var marker = L.marker([local.lat, local.lng]).addTo(map);
            
            // O que aparece quando clicas no marcador
            marker.bindPopup(`
                <div style="text-align:center;">
                    <h3>${icone} ${local.nome}</h3>
                    <p>${local.tipo}</p>
                    <button onclick="calcularRota(${local.lat}, ${local.lng})" style="padding:10px; background:#28a745; color:white; border:none; border-radius:5px;">Ir para aqui</button>
                </div>
            `);
        });

        // 4. Função para encontrar o utilizador (GPS do telemóvel)
        document.getElementById('locate-btn').addEventListener('click', function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    userLocation = L.latLng(position.coords.latitude, position.coords.longitude);
                    
                    // Se já existir um marcador do utilizador, remove-o
                    if (userMarker) { map.removeLayer(userMarker); }
                    
                    // Adiciona um marcador azul para o utilizador
                    userMarker = L.circleMarker(userLocation, {
                        color: '#0078A8', fillOpacity: 0.8, radius: 8
                    }).addTo(map).bindPopup("Tu estás aqui!").openPopup();
                    
                    map.setView(userLocation, 14);
                }, function() {
                    alert("Não foi possível encontrar a tua localização. Verifica se o GPS está ligado.");
                });
            } else {
                alert("O teu navegador não suporta geolocalização.");
            }
        });

        // 5. Função Mágica para Calcular a Rota, Tempo e Distância
        window.calcularRota = function(destLat, destLng) {
            if (!userLocation) {
                alert("Primeiro clica em '📍 Onde estou?' para sabermos de onde partes!");
                return;
            }

            // Remove a rota anterior se existir
            if (currentRoute) { map.removeControl(currentRoute); }

            var destination = L.latLng(destLat, destLng);

            // Cria a nova rota (isto diz-te o tempo e a distância na caixa superior direita)
            currentRoute = L.Routing.control({
                waypoints: [ userLocation, destination ],
                routeWhileDragging: false,
                language: 'pt', // Instruções em português
                createMarker: function() { return null; }, // Esconde marcadores extra da rota
                lineOptions: { styles: [{color: '#FF0000', opacity: 0.8, weight: 5}] } // Linha vermelha
            }).addTo(map);

            // Fecha o popup do marcador para limpar o ecrã
            map.closePopup();
        };
    </script>
</body>
</html>
